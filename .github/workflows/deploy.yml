name: CI / Deploy

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      landing_source:
        description: "Лендинг на Cloudflare Pages (тот же проект manicbot-landing / manicbot.com)"
        required: true
        default: manicbot-analysis
        type: choice
        options:
          - manicbot-analysis
          - manicbot-landing

jobs:
  # ─── Bot: test ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    name: Bot — Test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: manicbot/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: manicbot

      - name: Run tests
        run: npm test
        working-directory: manicbot

  # ─── Bot: deploy to Cloudflare Workers ──────────────────────
  deploy-bot:
    runs-on: ubuntu-latest
    name: Bot — Deploy Workers
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: manicbot/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: manicbot

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: manicbot
          command: deploy --config wrangler.toml

  # ─── Landing: build + deploy to Cloudflare Pages ────────────
  # Push main → новый сайт (manicbot-analysis). Ручной запуск → можно выбрать manicbot-landing (откат).
  deploy-landing:
    runs-on: ubuntu-latest
    name: Landing — Deploy Pages
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4

      - name: Выбор пакета лендинга
        id: landing
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.landing_source }}" = "manicbot-landing" ]; then
            echo "dir=manicbot-landing" >> "$GITHUB_OUTPUT"
            echo "📦 Деплой **legacy**: manicbot-landing (прежняя вёрстка сайта)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "dir=manicbot-analysis" >> "$GITHUB_OUTPUT"
            echo "📦 Деплой **текущий**: manicbot-analysis" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ steps.landing.outputs.dir }}/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ${{ steps.landing.outputs.dir }}

      - name: Build landing
        run: npm run build
        working-directory: ${{ steps.landing.outputs.dir }}

      - name: Verify dist (SPA + /blog static)
        run: |
          test -f dist/index.html
          test -f dist/blog/index.html
          test -f dist/blog/ru/manicbot-telegram-booking.html
          echo "OK: blog HTML present in Pages artifact"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ steps.landing.outputs.dir }}
          command: pages deploy dist --project-name=manicbot-landing --commit-dirty=true
