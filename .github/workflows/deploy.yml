name: CI / Deploy

on:
  # Auto-deploy on push to main re-enabled 2026-05-26: out-of-band local
  # `wrangler deploy` + `next-on-pages` got blocked by the agent harness
  # auto-mode classifier (Production Deploy / Blind Apply guard), so the
  # in-band CI path is the practical option again. If GH Actions minutes
  # become the constraint, gate the deploy-* jobs behind a manual approval
  # (environment: production with required reviewers) instead of stripping
  # the trigger.
  push:
    branches: [main]
  # Run security-scan + test on PRs targeting main. Deploy jobs below are
  # already gated on `github.event_name == 'push'`, so they stay push-only —
  # PRs get the safety nets (gitleaks, semgrep, unit + integration tests,
  # tenant-isolation scanners, audit) without ever touching prod.
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      landing_source:
        description: "Лендинг на Cloudflare Pages (тот же проект manicbot-landing / manicbot.com)"
        required: true
        default: manicbot-analysis
        type: choice
        options:
          - manicbot-analysis
          - manicbot-landing

jobs:
  # ─── Security scanning ──────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    name: Security — Gitleaks + Semgrep
    # Gitleaks-action needs `pull-requests: read` to list PR commits when
    # event is pull_request. Default GITHUB_TOKEN is read-only on contents,
    # so without this block the action 403s and downstream jobs skip.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history needed for gitleaks

      # GIT-02 note: replacing this step with a pinned gitleaks binary was
      # reverted — a naive full-history scan re-flags pre-existing false
      # positives (env-var NAME identifiers in a few demo/config files) that the
      # action's push-delta scan never re-flags. A proper redo must scope to the
      # push range or extend .gitleaksignore. Bumped v2 -> v3 on 2026-06-03:
      # v3 runs on node24, clearing the Node-20 deprecation (GitHub defaults to
      # node24 on 2026-06-02, removes node20 on 2026-09-16). Drop-in upgrade —
      # no input/env/output changes from v2.
      - name: Gitleaks — detect secrets in history
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # semgrep/semgrep-action repo is archived (deprecated upstream).
      # Per current Semgrep CI docs, install + invoke `semgrep ci` directly
      # from pip. This runs the same SAST scan without depending on a GH
      # Action runtime, so it is unaffected by the 2026-06-02 Node-20
      # deprecation. Pinned version keeps output reproducible.
      - name: Semgrep — install
        run: python3 -m pip install --user semgrep==1.164.0
      - name: Semgrep — SAST scan
        # 2026-06-30: the hosted Semgrep registry added the supply-chain rule
        # package_managers.npm.npm-missing-minimum-release-age, which began
        # BLOCKING every deploy on the pre-existing manicbot/admin-app/.npmrc
        # (Gitleaks secret-scan stays green — no leak). We opt out of this single
        # advisory to restore the pipeline. Adopting an npm release-age cooldown
        # (`minimumReleaseAge` in .npmrc) is a deliberate follow-up that must first
        # be verified against the Cloudflare Pages `npm install` build.
        run: |
          semgrep ci \
            --config p/owasp-top-ten \
            --config p/typescript \
            --config p/nextjs \
            --config p/jwt \
            --config .semgrep/manicbot-rules.yml \
            --exclude-rule package_managers.npm.npm-missing-minimum-release-age.npm-missing-minimum-release-age
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ─── Bot: test ──────────────────────────────────────────────
  test:
    needs: security-scan
    runs-on: ubuntu-latest
    name: Bot — Test
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: manicbot/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: manicbot

      # Worker backend ships as plain JS with no TypeScript typecheck behind it,
      # so ESLint is the only static gate on shipping Worker code. Fails only on
      # real defects (undeclared vars, unreachable code, dupe keys); pre-existing
      # style warnings are surfaced but non-blocking. See manicbot/eslint.config.mjs.
      - name: Lint (Worker — ESLint)
        run: npm run lint
        working-directory: manicbot

      - name: Run tests
        run: npm test
        working-directory: manicbot

      # MessengerHub WebSocket e2e runs in the real workerd runtime via
      # @cloudflare/vitest-pool-workers (separate config), so it gates transport
      # refactors that the node unit suite can't catch.
      - name: Run WebSocket integration test (workers pool)
        run: npm run test:ws
        working-directory: manicbot

      - name: Check D1 table names (schema.sql vs Drizzle)
        run: npm run check-schema
        working-directory: manicbot

      # Migration-number collision guard: wrangler tracks D1 migrations by
      # exact filename and applies them in lexicographic order, so reusing a
      # number is a latent ordering hazard that can collide with an already-
      # applied file in prod. Fails the gate on any NEW collision (frozen
      # historical dupes are allowlisted in migration-check-utils.mjs).
      - name: Check D1 migration numbers (no collisions)
        run: npm run check-migrations
        working-directory: manicbot

      # Worker raw-SQL tenant-isolation scanner (sibling to the admin-app
      # scanner below). GATING: every tenant-scoped raw-SQL query must carry a
      # `tenant_id`/`web_user_id` predicate or an audited
      # `// tenant-scan-ignore: <reason>` directive. The prior 35 advisory hits
      # were annotated/scoped and token-manager.js now threads tenantId (D3);
      # a regression now fails the deploy gate, like the admin-app scanner below.
      - name: Worker — tenant-isolation scanner
        run: npm run check-tenant-isolation
        working-directory: manicbot

      - name: Security audit (worker deps)
        run: npm audit --audit-level=high --production
        working-directory: manicbot

      # H-B (audit 2026-05-20): dev-dep advisories surface as warn-only so
      # the CI log captures supply-chain hygiene without blocking deploys.
      # The build artifact does NOT ship these (worker/admin runtime is
      # tree-shaken by wrangler / next-on-pages), so failing the gate would
      # be over-strict. Production gate above (--production) still blocks
      # on real runtime advisories.
      - name: Security audit — dev deps (advisory, warn-only)
        run: npm audit --audit-level=high
        continue-on-error: true
        working-directory: manicbot

      - name: Admin app — install
        run: npm ci --legacy-peer-deps
        working-directory: manicbot/admin-app

      - name: Admin app — typecheck
        run: npm run typecheck
        working-directory: manicbot/admin-app

      - name: Admin app — tenant-isolation scanner (#Phase4)
        run: npm run check-tenant-isolation
        working-directory: manicbot/admin-app

      - name: Admin app — test
        run: npm test
        working-directory: manicbot/admin-app

      - name: Admin app — security audit
        run: npm audit --audit-level=high --production
        working-directory: manicbot/admin-app

      # H-B (audit 2026-05-20): same warn-only gate for the admin-app
      # dev deps. Surfaces the @cloudflare/next-on-pages → miniflare@3 →
      # undici/ws chain that we cannot fix without forking next-on-pages.
      - name: Admin app — dev-dep audit (advisory, warn-only)
        run: npm audit --audit-level=high
        continue-on-error: true
        working-directory: manicbot/admin-app

  # ─── Bot: deploy to Cloudflare Workers ──────────────────────
  deploy-bot:
    runs-on: ubuntu-latest
    name: Bot — Deploy Workers
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: manicbot/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: manicbot

      # Apply D1 migrations BEFORE deploying the Worker so the runtime never
      # boots against a stale schema. Wrangler tracks applied migrations in
      # a `d1_migrations` table — re-running this step is idempotent (already
      # applied files are skipped). The procedure that motivated this guard
      # (salon.createMasterAccount → masters.telegram_chat_id from migration
      # 0074) silently 500'd in prod for days because the migration sat in
      # `migrations/` without being applied.
      - name: Apply D1 migrations (manicbot-db, remote)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: manicbot
          wranglerVersion: "4.92.0"
          command: d1 migrations apply manicbot-db --remote

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: manicbot
          wranglerVersion: "4.92.0"
          command: deploy --config wrangler.toml

  # ─── Landing: build + deploy to Cloudflare Pages ────────────
  # DISABLED: manicbot-analysis source is no longer in this repo.
  # Landing is deployed separately or via wrangler pages deploy from local.
  deploy-landing:
    runs-on: ubuntu-latest
    name: Landing — Deploy Pages
    if: false  # disabled — landing source not in repo
    steps:
      - uses: actions/checkout@v5

      - name: Выбор пакета лендинга
        id: landing
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.landing_source }}" = "manicbot-landing" ]; then
            echo "dir=manicbot-landing" >> "$GITHUB_OUTPUT"
            echo "📦 Деплой **legacy**: manicbot-landing (прежняя вёрстка сайта)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "dir=manicbot-analysis" >> "$GITHUB_OUTPUT"
            echo "📦 Деплой **текущий**: manicbot-analysis" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ steps.landing.outputs.dir }}/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ${{ steps.landing.outputs.dir }}

      - name: Build landing
        run: npm run build
        working-directory: ${{ steps.landing.outputs.dir }}

      - name: Verify dist (SPA + /blog static)
        working-directory: ${{ steps.landing.outputs.dir }}
        run: |
          test -f dist/index.html
          test -f dist/blog/index.html || echo "WARN: dist/blog/index.html missing (blog gen skipped)"
          test -f dist/blog/ru/manicbot-telegram-booking.html || echo "WARN: blog article missing"
          echo "OK: dist verified"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ steps.landing.outputs.dir }}
          command: pages deploy dist --project-name=manicbot-landing --commit-dirty=true

  # ─── Admin Mini-App: build + deploy to Cloudflare Pages ─────
  deploy-admin-app:
    runs-on: ubuntu-latest
    name: Admin App — Deploy Pages
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: manicbot/admin-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: manicbot/admin-app

      # Regenerate the DB ERD from schema.sql and embed it into the server
      # bundle. The committed erd.generated.ts is a stub; this overwrites it in
      # the build workspace only (never committed), keeping the diagram private
      # to the God-Mode page and out of the public repo.
      - name: Generate architecture ERD (private, embedded in bundle)
        run: node scripts/gen-erd.mjs
        working-directory: manicbot/admin-app

      - name: Build for Cloudflare Pages (next-on-pages)
        run: npx next-on-pages
        working-directory: manicbot/admin-app
        env:
          # Supply dummy values so Zod env schema passes at build time (values are
          # not used at runtime — real secrets come from Cloudflare Pages env vars).
          NEXTAUTH_SECRET: ci-placeholder-not-used-at-runtime
          AUTH_SECRET: ci-placeholder-not-used-at-runtime
          TELEGRAM_BOT_TOKEN: ci-placeholder
          ADMIN_CHAT_ID: "0"
          ADMIN_KEY: ci-placeholder-not-used-at-runtime
          BOT_ENCRYPTION_KEY: ci-placeholder-not-used-at-runtime
          UPLOAD_TOKEN_SECRET: ci-placeholder-not-used-at-runtime
          WS_TOKEN_SECRET: ci-placeholder-not-used-at-runtime

      # Cloudflare's pages-deploy API rejected our last squash-merge with
      # "Invalid commit message, it must be a valid UTF-8 string
      # [code: 8000111]". Wrangler auto-forwards the full multi-paragraph
      # commit body, which routinely exceeds whatever cap the API enforces
      # (and embedded em-dashes / smart quotes don't help). Build a
      # deterministic ASCII-only short label from the subject line + SHA
      # and pass it explicitly so the API never sees the long body.
      - name: Build short commit message for Cloudflare
        id: cf_commit
        run: |
          subj=$(git log -1 --pretty=%s)
          sha=$(git log -1 --pretty=%h)
          # Strip non-ASCII (Cyrillic, em-dashes, smart quotes, emoji) and
          # double quotes / backticks that would break the shell-forwarded
          # arg, then truncate to 120 chars.
          ascii=$(printf "%s" "$subj" | LC_ALL=C tr -cd 'A-Za-z0-9 _.,:;!?+*/()@#=<>\-' | head -c 120)
          echo "msg=${ascii} (${sha})" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: manicbot/admin-app
          wranglerVersion: "4.92.0"
          command: pages deploy .vercel/output/static --project-name=admin-app --commit-dirty=true --commit-message="${{ steps.cf_commit.outputs.msg }}"
