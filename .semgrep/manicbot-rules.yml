# Custom Semgrep rules for ManicBot.
# Run via: semgrep --config .semgrep/manicbot-rules.yml manicbot/
# Wired into CI via .github/workflows/deploy.yml `Semgrep — SAST scan` step.

rules:
  # ── #H4 regression guard ────────────────────────────────────────────────
  # State-changing tRPC mutations must NOT use `publicProcedure`. They must
  # use `protectedProcedure` (or stricter: `tenantOwnerProcedure`,
  # `masterProcedure`, `adminProcedure`, `systemAdminProcedure`).
  #
  # Two allowlist categories below — adding a new publicProcedure mutation
  # requires consciously editing this rule:
  #
  #   1. Permanent — bootstrap / token-validated public flows that must be
  #      public by definition (no session). Each is rate-limited and
  #      content-validated.
  #
  #   2. TODO(#259) — pre-existing tech debt where the handler auths via
  #      `assertTenantOwner` inside but the type-level builder is wrong.
  #      Migrate each to `tenantOwnerProcedure` post-launch; until then
  #      they're exempted here so the rule doesn't re-flag on every push.
  #
  # NOTE on the markers in router source: PR #260 added inline
  # `// nosemgrep: trpc-public-procedure-mutation` comments at each site.
  # The legacy CI Semgrep image (`semgrep/semgrep-action@v1`) does not
  # honor line-above markers reliably, so the load-bearing allowlist
  # lives here. The inline markers stay as call-site documentation of the
  # TODO link to #259 — they don't change behavior.
  - id: trpc-public-procedure-mutation
    message: >-
      `publicProcedure` should not be used for state-changing tRPC mutations.
      Use `protectedProcedure` or a role-scoped builder (`tenantOwnerProcedure`,
      `masterProcedure`, `adminProcedure`). If the mutation is genuinely a
      bootstrap public flow (registration / email verification / token-
      validated), add a new `pattern-not:` entry to the `patterns:` block
      of this rule in `.semgrep/manicbot-rules.yml` — that audit gate is
      the point.
    severity: ERROR
    languages: [typescript]
    paths:
      include:
        - "manicbot/admin-app/src/server/api/routers/**/*.ts"
    patterns:
      - pattern: |
          $NAME: publicProcedure
            .input(...)
            .mutation(...)
      # Allowlist via metavariable regex (rather than per-name `pattern-not:`)
      # because Semgrep's TS parser refuses `delete:` as the lead token of a
      # pattern (it parses as the `delete` operator keyword). The regex is
      # anchored on $NAME so it only matches the procedure-name position.
      #
      # Category 1 — Permanent (bootstrap / token-validated public flows;
      #   rate-limited):
      #     register, verifyEmail, resendVerificationCode,
      #     requestPasswordReset, resetPassword, createLead, emailSubscribe,
      #     record (anon consent capture), confirmTransfer,
      #     acceptInvitationByToken
      #
      # Category 2 — TODO(#259) — auth via assertTenantOwner inside handler;
      #   migrate to tenantOwnerProcedure post-launch:
      #     createManual, rescheduleAppointment, update, markStep,
      #     create, delete, updateStatus, addReply, deleteReply,
      #     updateConfig, resetClient
      # Negative lookahead — rule fires only when $NAME is NOT in the
      # allowlist. `metavariable-regex` filters TO MATCH, so the
      # exclusion must be expressed via `(?!...)`.
      - metavariable-regex:
          metavariable: $NAME
          regex: ^(?!(register|verifyEmail|resendVerificationCode|requestPasswordReset|resetPassword|createLead|emailSubscribe|record|confirmTransfer|acceptInvitationByToken|createManual|rescheduleAppointment|update|markStep|create|delete|updateStatus|addReply|deleteReply|updateConfig|resetClient)$)[A-Za-z_$][A-Za-z0-9_$]*$

  # ── #S-04 / #M2 regression guard ────────────────────────────────────────
  # Worker admin endpoints must not accept ADMIN_KEY from URL query params
  # (it leaks into Cloudflare access logs and Referer headers). Only
  # `Authorization: Bearer <key>` is acceptable.
  - id: admin-key-query-param
    message: >-
      ADMIN_KEY must travel via `Authorization: Bearer <key>` header, not as
      a `?key=` query parameter. Use `requireAdmin(request, ctx)` or
      `isAdminKeyValid(url, env, request)` (Bearer-only).
    severity: ERROR
    languages: [javascript, typescript]
    paths:
      include:
        - "manicbot/src/http/**/*.js"
        - "manicbot/src/http/**/*.ts"
    pattern-either:
      - pattern: |
          $URL.searchParams.get("key")
      - pattern: |
          $URL.searchParams.get('key')

  # ── #N1 regression guard ────────────────────────────────────────────────
  # Password-reset emails must use `sendPasswordResetCodeEmail` (6-digit
  # code), not the legacy `sendPasswordResetEmail` (URL token). The legacy
  # function is kept exported for backwards-compat during the 1h grace
  # window after deploy; new callsites are forbidden.
  - id: legacy-url-password-reset
    message: >-
      `sendPasswordResetEmail` is deprecated (URL token leaks via Referer /
      MTA logs). Use `sendPasswordResetCodeEmail` (6-digit code) instead.
    severity: ERROR
    languages: [typescript]
    paths:
      include:
        - "manicbot/admin-app/src/**/*.ts"
        - "manicbot/admin-app/src/**/*.tsx"
      exclude:
        - "manicbot/admin-app/src/server/email/emailService.ts"
        - "manicbot/admin-app/src/__tests__/**"
    pattern: |
      sendPasswordResetEmail(...)

  # Same regression guard for the email-change variant.
  - id: legacy-url-email-change
    message: >-
      `sendEmailChangeVerification` is deprecated (URL token leaks).
      Use `sendEmailChangeCodeVerification` (6-digit code) instead.
    severity: ERROR
    languages: [typescript]
    paths:
      include:
        - "manicbot/admin-app/src/**/*.ts"
        - "manicbot/admin-app/src/**/*.tsx"
      exclude:
        - "manicbot/admin-app/src/server/email/emailService.ts"
        - "manicbot/admin-app/src/__tests__/**"
    pattern: |
      sendEmailChangeVerification(...)
