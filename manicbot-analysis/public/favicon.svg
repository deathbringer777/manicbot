<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ManicBot">
  <defs>
    <linearGradient id="mbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="45%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <!-- Round badge (reads well as a circular favicon in browser chrome) -->
  <circle cx="32" cy="32" r="30" fill="url(#mbg)"/>
  <circle cx="32" cy="32" r="27" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.25"/>
  <text
    x="32"
    y="36"
    text-anchor="middle"
    dominant-baseline="middle"
    font-size="30"
    font-family='ui-rounded, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", system-ui, sans-serif'
  >💅</text>
</svg>
