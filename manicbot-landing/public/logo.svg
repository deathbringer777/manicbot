<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="nail" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8959e"/>
      <stop offset="100%" stop-color="#9a7a85"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8d5c4"/>
      <stop offset="100%" stop-color="#d4b8a0"/>
    </linearGradient>
    <!-- дуга по нижнему внутреннему краю для текста -->
    <path id="arc" d="M 22 52 A 28 28 0 0 1 78 52" fill="none"/>
  </defs>
  <!-- круг: мягкий розовый фон, тонкая обводка -->
  <circle cx="50" cy="50" r="46" fill="#e8c4d4" stroke="#c9a0a8" stroke-width="2"/>
  <!-- палец с ногтем (упрощённо) -->
  <g transform="translate(50 50) rotate(-35)">
    <!-- палец -->
    <path fill="url(#skin)" d="M -6 22 Q -8 8 -4 -18 Q 0 -28 4 -18 Q 8 8 6 22 Q 2 28 -2 28 Q -6 28 -6 22 Z"/>
    <!-- ноготь с лаком -->
    <path fill="url(#nail)" d="M -4 -16 Q 0 -26 4 -16 L 4 4 Q 2 10 -2 10 Q -4 10 -4 4 Z"/>
    <!-- блик на ногте -->
    <ellipse cx="0" cy="-8" rx="1.5" ry="3" fill="rgba(255,255,255,0.5)" transform="rotate(-25 0 -8)"/>
  </g>
  <!-- manicbot по внутреннему краю круга -->
  <text font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#9a7a85" letter-spacing="0.2em">
    <textPath href="#arc" startOffset="50%" text-anchor="middle">manicbot</textPath>
  </text>
</svg>
