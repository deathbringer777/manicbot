name = "manicbot"
main = "src/worker.js"
compatibility_date = "2025-01-01"

routes = [
  { pattern = "manicbot.com", custom_domain = true },
  { pattern = "www.manicbot.com", custom_domain = true },
]

# ─── Публичные переменные окружения ─────────────────────────────────────────
[vars]
APP_BASE_URL = "https://manicbot.com"
# Landing (Cloudflare Pages) — must be the *.pages.dev (or preview) URL, NOT manicbot.com
# If the Worker dashboard has an empty LANDING_URL, code falls back to manicbot-landing.pages.dev
LANDING_URL = "https://manicbot-landing.pages.dev"
# Admin mini-app (God Mode) — must match Cloudflare Pages production URL.
# GitHub Actions deploys with --project-name=admin-app → https://admin-app.pages.dev
# If you use a custom domain or another Pages project name, set ADMIN_APP_URL in the Worker dashboard.
ADMIN_APP_URL = "https://admin-app-3nc.pages.dev"
# #O-01 — D1 is bound in production, so legacy POST /webhook (no botId) must
# be rejected. All connected bots use POST /webhook/{botId}. The legacy path
# was only relevant during initial migration from KV-only single-bot mode.
REQUIRE_WEBHOOK_BOT_ID = "1"
# Meta App ID (public — not a secret). Paired with the META_APP_SECRET
# secret for User→long-lived-User token exchange in the IG recovery and
# auto-rotation paths. Set to the ManicBot Meta App.
META_APP_ID = "1568224577592551"
# Instagram Login product App ID (public — not a secret). Distinct from
# META_APP_ID: post-Mar-2026 Meta split Instagram Messaging onto a
# separate "Instagram Login" product with its own App ID + Secret +
# endpoint (graph.instagram.com). Paired with META_INSTAGRAM_APP_SECRET.
# Without this var, /meta/oauth/start with provider=instagram returns
# 503 oauth_not_configured.
META_INSTAGRAM_APP_ID = "3756985564432185"
# Retention dry-run: when "1", phaseRetention logs counts but skips DELETE/archive.
# Production default is "0" (live deletes with R2 archive). Flip to "1" in the
# Cloudflare dashboard to preview a retention run without losing data.
RETENTION_DRY_RUN = "0"
# Public URL prefix of the marketing-assets R2 bucket. Worker uploads
# generated post images here, then passes `{prefix}/{key}` to Meta Graph
# API as `image_url` so Meta can fetch the asset. Set via
# `npx wrangler r2 bucket dev-url enable manicbot-marketing-assets` and
# pinned here so the Worker doesn't have to query R2 for the URL.
MARKETING_ASSETS_PUBLIC_URL = "https://pub-1dff67fc0bd644c59f1677cb5d553ce6.r2.dev"
# Master kill switch for the @manicbot_com IG autopilot cron phase.
# Default "0" — cron will SKIP the phase, no captions/images/posts created.
# Flip to "1" via Cloudflare dashboard once these are all in place:
#   - Meta App approved for `instagram_content_publish`
#   - wrangler secret put ANTHROPIC_API_KEY
#   - wrangler secret put MARKETING_IG_PAGE_ID
#   - wrangler secret put MARKETING_IG_ACCESS_TOKEN
# Manual triggers via /admin/marketing-tick + /admin/marketing-publish-one
# ignore this flag (always run, useful for testing before flipping live).
MARKETING_AUTOPILOT_ENABLED = "0"

# ⚠️  ADMIN_CHAT_ID перенесён в секрет:
#   wrangler secret put ADMIN_CHAT_ID
# (значение: Telegram chat_id создателя платформы — даёт полный root-доступ)

# ─── Секреты (задаются через wrangler secret put, НЕ хранятся в этом файле) ─
# Следующие переменные ОБЯЗАТЕЛЬНО должны быть установлены как секреты:
#
#   wrangler secret put STRIPE_SECRET_KEY          # sk_live_...
#   wrangler secret put STRIPE_WEBHOOK_SECRET      # whsec_...
#   wrangler secret put STRIPE_PRICE_START_MONTHLY # price_...
#   wrangler secret put STRIPE_PRICE_PRO_MONTHLY   # price_...
#   wrangler secret put STRIPE_PRICE_MAX_MONTHLY   # price_...
#   wrangler secret put CLOUDFLARE_ACCOUNT_ID
#
# Без STRIPE_SECRET_KEY и STRIPE_WEBHOOK_SECRET Stripe webhooks вернут 400/401.
# Без STRIPE_PRICE_* кнопки оплаты не будут отображаться (canCheckout = false).

# CLOUDFLARE_ACCOUNT_ID should be set as a secret: wrangler secret put CLOUDFLARE_ACCOUNT_ID
#
# Instagram: optional comma/space-separated IGSIDs to never route to onMsg/AI (e.g. platform @manicbot_com).
#   wrangler secret put INSTAGRAM_IGNORE_SENDER_IDS
# Value example: "1784360123456789" (get IGSID from Meta webhook logs or Graph API — not the @username).

[triggers]
crons = ["*/15 * * * *"]

# Sprint 2 (#5): Queues fan-out for tenant cron — scales past 100 tenants.
# Producer: scheduled() lists tenants and enqueues one message each.
# Consumer: queue() handles one tenant per message with full CPU budget.
[[queues.producers]]
queue = "manicbot-tenant-cron"
binding = "MANICBOT_TENANT_CRON"

[[queues.consumers]]
queue = "manicbot-tenant-cron"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "manicbot-tenant-cron-dlq"

[[kv_namespaces]]
binding = "MANICBOT"
id = "62a7d16805e742918a82184e879537cc"

[[d1_databases]]
binding = "DB"
database_name = "manicbot-db"
database_id = "2c9bfdad-3dc0-4290-b26d-bcada6c02bfb"
# Pin the migrations directory so CI (and local `wrangler d1 migrations apply`)
# always resolves the same path regardless of the working directory. Wrangler
# defaults to `migrations/` adjacent to wrangler.toml, but making it explicit
# avoids the "0074 sat in repo but not in prod" failure mode we hit on
# 2026-05-17 — see deploy.yml "Apply D1 migrations" step.
migrations_dir = "migrations"

# ─── R2 object storage for salon branding assets ─────────────────────────────
# Powers /upload/asset (POST, signed token) + /cdn/<key> (GET, public read-through
# via the Worker). Bucket created 2026-05-17. Keep this binding live — without it
# every upload (logo / cover / photo / portfolio / service_photo / client_avatar)
# 500s at the Worker side with "R2 not bound".
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "manicbot-assets"

# ─── R2 archive for phaseRetention pre-delete export ─────────────────────────
# Rows pruned by phaseRetention (audit_log, error_log, analytics_events,
# permission_elevation_codes, stripe_events, marketing_sends) are written to
# this bucket as gzipped NDJSON before the DELETE runs. Key layout:
#   archive/{table}/{YYYY-MM-DD}T{HHmmss}Z.jsonl.gz
#
# Activation (one-time, in order):
#   1. Enable R2 in the Cloudflare dashboard (Storage → R2 → Enable).
#   2. npx wrangler r2 bucket create manicbot-archive
#   3. Uncomment the [[r2_buckets]] block below and redeploy.
#
# If R2 is not yet enabled, phaseRetention runs without archive (logs
# `cron.retention.archive_failed` with reason `no_archive_binding` and
# still runs the DELETE — graceful fallback by design).
[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "manicbot-archive"

# ─── R2 bucket for @manicbot_com IG autopilot generated images ──────────────
# Cron-generated post images (Workers AI flux-1-schnell → 1080×1350 PNG)
# are uploaded here, then surfaced to Meta Graph API as a public URL via
# MARKETING_ASSETS_PUBLIC_URL. Public access enabled via wrangler:
#   wrangler r2 bucket dev-url enable manicbot-marketing-assets
[[r2_buckets]]
binding = "MARKETING_ASSETS"
bucket_name = "manicbot-marketing-assets"

# ─── Required secret for signed upload tokens ────────────────────────────────
#   wrangler secret put UPLOAD_TOKEN_SECRET
# Same value must be set on the admin-app Pages project (Pages env var) so that
# minted tokens verify on the Worker.

[ai]
binding = "AI"

# ─── Durable Object: MessengerHub (Phase 3 / migration 0067) ────────────────
# Per-tenant fan-out hub for the internal messenger. Holds open WebSocket
# connections from /messages tabs and rebroadcasts `message.new` /
# `thread.updated` frames published by the Worker on inbound + outbound
# messenger events.
#
# Pattern reference: `src/durable/messengerHub.js`. Uses hibernatable
# WebSocket API so an idle tenant doesn't burn CPU.
#
# First-deploy migration (required for a NEW DO class). After this is in
# place, subsequent deploys reuse the class without further migrations.
[[durable_objects.bindings]]
name = "MESSENGER_HUB"
class_name = "MessengerHub"

[[migrations]]
tag = "v1"
new_classes = ["MessengerHub"]

# ─── Workers Logs (head sampling) ──────────────────────────────────────────
# Enabled pre-launch so prod errors surface in the Cloudflare dashboard +
# `wrangler tail`. Pair with the in-house captureError() → D1 error_events
# (God Mode /errors) — this gives us a second pane of glass at low cost.
#
# A crash that happens BEFORE captureError gets to write (e.g. in
# validateSecurityConfig at startup, or inside the captureError path
# itself) is invisible to /errors but visible here. That's the reason
# this block is non-negotiable in production — see
# test/wrangler-observability-invariant.test.js.
#
# head_sampling_rate = 1 means every invocation is logged. Drop to 0.1
# once we cross ~1M req/day to keep billing in check.
[observability]
enabled = true
head_sampling_rate = 1
