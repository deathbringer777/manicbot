name = "manicbot"
main = "src/worker.js"
compatibility_date = "2025-01-01"

routes = [
  { pattern = "manicbot.com", custom_domain = true },
  { pattern = "www.manicbot.com", custom_domain = true },
]

# ─── Публичные переменные окружения ─────────────────────────────────────────
[vars]
APP_BASE_URL = "https://manicbot.com"
# Landing (Cloudflare Pages) — must be the *.pages.dev (or preview) URL, NOT manicbot.com
# If the Worker dashboard has an empty LANDING_URL, code falls back to manicbot-landing.pages.dev
LANDING_URL = "https://manicbot-landing.pages.dev"
# Admin mini-app (God Mode panel) — Cloudflare Pages
ADMIN_APP_URL = "https://admin-app-3nc.pages.dev"

# ⚠️  ADMIN_CHAT_ID перенесён в секрет:
#   wrangler secret put ADMIN_CHAT_ID
# (значение: Telegram chat_id создателя платформы — даёт полный root-доступ)

# ─── Секреты (задаются через wrangler secret put, НЕ хранятся в этом файле) ─
# Следующие переменные ОБЯЗАТЕЛЬНО должны быть установлены как секреты:
#
#   wrangler secret put STRIPE_SECRET_KEY          # sk_live_...
#   wrangler secret put STRIPE_WEBHOOK_SECRET      # whsec_...
#   wrangler secret put STRIPE_PRICE_START_MONTHLY # price_...
#   wrangler secret put STRIPE_PRICE_PRO_MONTHLY   # price_...
#   wrangler secret put STRIPE_PRICE_STUDIO_MONTHLY# price_...
#   wrangler secret put CLOUDFLARE_ACCOUNT_ID
#
# Без STRIPE_SECRET_KEY и STRIPE_WEBHOOK_SECRET Stripe webhooks вернут 400/401.
# Без STRIPE_PRICE_* кнопки оплаты не будут отображаться (canCheckout = false).

# CLOUDFLARE_ACCOUNT_ID should be set as a secret: wrangler secret put CLOUDFLARE_ACCOUNT_ID

[triggers]
crons = ["*/15 * * * *"]

[[kv_namespaces]]
binding = "MANICBOT"
id = "62a7d16805e742918a82184e879537cc"

[[d1_databases]]
binding = "DB"
database_name = "manicbot-db"
database_id = "2c9bfdad-3dc0-4290-b26d-bcada6c02bfb"

[ai]
binding = "AI"
